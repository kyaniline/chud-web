<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Are You a Chud?</title>
  <meta name="description" content="Roll the dice. Find out if you're a chud. 🎰" />

  <!-- Open Graph -->
  <meta property="og:title" content="Are You a Chud?" />
  <meta property="og:description" content="Roll the dice. Find out if you're a chud. 🎰" />
  <meta property="og:image" content="https://areyouachud.com/assets/images/og-preview.png" />
  <meta property="og:url" content="https://areyouachud.com" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Are You a Chud?" />
  <meta name="twitter:description" content="Roll the dice. Find out if you're a chud. 🎰" />
  <meta name="twitter:image" content="https://areyouachud.com/assets/images/og-preview.png" />

  <!-- PWA -->
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/images/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/assets/images/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/styles.css" />

  <!-- GA4 placeholder — replace G-XXXXXXXXXX with your measurement ID -->
  <!--
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
  -->
</head>
<body>
  <!-- Background image layer -->
  <div class="bg-layer" id="bgLayer" aria-hidden="true"></div>

  <!-- Click-to-start overlay (required for audio policy) -->
  <div class="start-overlay" id="startOverlay">
    <div class="start-content">
      <h1 class="start-title">ARE YOU A CHUD?</h1>
      <button class="start-btn" id="startBtn">
        <span class="start-btn-text">FIND OUT</span>
        <span class="start-btn-sub">click to begin</span>
      </button>
    </div>
  </div>

  <!-- Main content -->
  <main class="main" id="mainContent">
    <!-- Slot machine -->
    <div class="slot-machine" id="slotMachine">
      <div class="slot-label">DETERMINING YOUR STATUS...</div>
      <div class="slot-window">
        <div class="slot-reel" id="slotReel">
          <div class="slot-item chud">YOU ARE A CHUD</div>
          <div class="slot-item chad">YOU AREN'T A CHUD</div>
          <div class="slot-item chud">YOU ARE A CHUD</div>
          <div class="slot-item chad">YOU AREN'T A CHUD</div>
          <div class="slot-item chud">YOU ARE A CHUD</div>
          <div class="slot-item chad">YOU AREN'T A CHUD</div>
          <div class="slot-item chud">YOU ARE A CHUD</div>
          <div class="slot-item chad">YOU AREN'T A CHUD</div>
        </div>
      </div>
    </div>

    <!-- Result display -->
    <div class="result-container" id="resultContainer">
      <h1 class="result-text" id="resultText"></h1>
      <p class="taunt-text" id="tauntText"></p>

      <!-- Actions -->
      <div class="actions" id="actions">
        <button class="reroll-btn" id="rerollBtn">
          <span class="reroll-icon">🎰</span> REROLL
        </button>
        <div class="share-buttons">
          <button class="share-btn share-twitter" id="shareTwitter" title="Share on X/Twitter">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            SHARE
          </button>
          <button class="share-btn share-copy" id="shareCopy" title="Copy link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            COPY LINK
          </button>
        </div>
      </div>
    </div>

    <!-- Mute toggle -->
    <button class="mute-btn" id="muteBtn" title="Toggle sound" aria-label="Toggle sound">
      <svg class="mute-icon-on" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <svg class="mute-icon-off" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
    </button>
  </main>

  <script src="/app.js"></script>
</body>
</html>
